name: Auto Bump Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'composer.json'
      - 'bin/php-migrater'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    # Skip if the commit was made by this workflow (prevents infinite loops)
    if: "!contains(github.event.head_commit.message, '[skip-bump]') && github.actor != 'github-actions[bot]'"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Bump patch version
        run: php scripts/bump-version.php patch

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.json bin/php-migrater
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version [skip-bump]"
          git push
